	<div class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>

            <li style="float: right"><a href="https://github.com/lambda-foundation" target="_blank">GitHub</a></li>
        </ul>

    <div class="background-image">
      <div class="box">
        <h1>Lambda Foundation λ - Signup</h1>
        <h2>Join the club!</h2>
      </div>
    </div>

	<div class="light-content-box">
		<form id="formElem">
			<label>Discord Tag</label>
			<input type="text" name="discordTag" placeholder="example#1234">
			<br>

			<label>First Name</label>
			<input type="text" name="firstName" placeholder="Kyle">
			<br>

			<label>First Name</label>
			<input type="text" name="lastName" placeholder="McDuffle">
			<br>

			<!-- This is a bot catcher. If any bot tries to submit data and fills this out, do not send to the webhook. -->
			<input type="text" name="email" style="display: none">

			<input type="submit">
		</form>
	</div>

	<cta-modal id="tag-validation">
		<div slot="modal">
		  <h2>Discord Tag doesn't follow correct format!</h2>
		  <p>Format: example#1234</p>
		</div>
	</cta-modal>

	<cta-modal id="name-validation">
		<div slot="modal">
		  <h2>Name is empty!</h2>
		  <p>Please add a name!</p>
		</div>
	</cta-modal>

    <footer>
	  
      <div class="waves">
        <div class="wave" id="wave1"></div>

    </footer>
